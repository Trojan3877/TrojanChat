name: CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  structure-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify backend structure
        run: |
          test -f backend/app/main.py
          test -f backend/requirements.txt

      - name: Verify frontend structure
        run: |
          test -f frontend/package.json
          test -f frontend/app/page.tsx

      - name: Verify workflow docs
        run: |
          test -f README.md