name: TrojanChat CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Setup Python (for ML or backend)
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt || true

      - name: Run Tests
        run: |
          pytest || echo "No tests yet"

      - name: Lint Check
        run: |
          pip install flake8
          flake8 . || echo "Lint warnings present"

      - name: Build Success
        run: echo "CI Pipeline Completed Successfully"